[build]
  command = "npm run build"
  publish = "dist"

[functions]
  timeout = 26

[[edge_functions]]
  path = "/api/generate-flashcards"
  function = "generate-flashcards"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
